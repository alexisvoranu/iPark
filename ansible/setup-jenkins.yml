- name: Install and Configure Jenkins
  hosts: automation_servers
  become: true
  tasks:
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: true

    - name: Install OpenJDK 21
      ansible.builtin.apt:
        name: openjdk-21-jdk
        state: present

    - name: Download current Jenkins repository key
      ansible.builtin.get_url:
        url: https://pkg.jenkins.io/debian-stable/jenkins.io-2026.key
        dest: /usr/share/keyrings/jenkins-keyring.asc
        mode: '0644'

    - name: Add current Jenkins apt repository
      ansible.builtin.apt_repository:
        repo: "deb [signed-by=/usr/share/keyrings/jenkins-keyring.asc] https://pkg.jenkins.io/debian-stable binary/"
        state: present
        filename: jenkins

    - name: Install Jenkins
      ansible.builtin.apt:
        name: jenkins
        state: present
        update_cache: true

    - name: Ensure Jenkins service is started and enabled
      ansible.builtin.systemd:
        name: jenkins
        state: started
        enabled: true

    - name: Purge conflicting packages
      ansible.builtin.apt:
        name:
          - containerd
          - docker
          - docker.io
          - containerd.io
        state: absent
        purge: true

    - name: Install Docker and Ansible
      ansible.builtin.apt:
        name:
          - docker.io
          - ansible
        state: latest
        update_cache: true

    - name: Add jenkins user to docker group
      ansible.builtin.user:
        name: jenkins
        groups: docker
        append: true

    - name: Restart Jenkins to apply docker group permissions
      ansible.builtin.systemd:
        name: jenkins
        state: restarted