---
- name: Deploy Spring Boot Application to Kubernetes (K3s) on AWS EC2
  hosts: aws_servers
  become: true
  connection: ssh

  tasks:
    - name: Ensure k8s directory exists on EC2
      ansible.builtin.file:
        path: /home/ec2-user/k8s
        state: directory
        owner: ec2-user
        group: ec2-user
        mode: '0755'

    - name: Copy Kubernetes configurations to server
      ansible.builtin.copy:
        src: "k8s/{{ item }}"
        dest: "/home/ec2-user/k8s/{{ item }}"
        owner: ec2-user
        group: ec2-user
        mode: '0644'
      loop:
        - ipark-deployment.yaml
        - ipark-service.yaml

    - name: Apply Kubernetes configurations
      ansible.builtin.shell: |
        kubectl apply -f /home/ec2-user/k8s/ipark-deployment.yaml
        kubectl apply -f /home/ec2-user/k8s/ipark-service.yaml
        kubectl rollout restart deployment ipark-deployment