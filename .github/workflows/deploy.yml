name: iPark ECS CI/CD Pipeline

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build Artifact with Maven
        run: mvn clean package -DskipTests

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ipark-app
          IMAGE_TAG: latest
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to Amazon ECS Fargate
        env:
          ECS_CLUSTER: dev-ipark-cluster
          ECS_SERVICE: dev-ipark-service
          STRIPE_SECRET: ${{ secrets.STRIPE_API_KEY }}
          STRIPE_PUBLIC: ${{ secrets.STRIPE_API_PUBLIC_KEY }}
          STRIPE_WEBHOOK: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          aws ecs describe-task-definition --task-definition dev-ipark-task --query taskDefinition > task-def.json
          
          jq --arg secret "$STRIPE_SECRET" \
             --arg public "$STRIPE_PUBLIC" \
             --arg webhook "$STRIPE_WEBHOOK" \
             '.containerDefinitions[0].environment += [
               {"name": "STRIPE_API_KEY", "value": $secret},
               {"name": "STRIPE_API_PUBLIC_KEY", "value": $public},
               {"name": "STRIPE_WEBHOOK_SECRET", "value": $webhook}
             ]' task-def.json > new-task-def.json
          
          NEW_TASK_ARN=$(aws ecs register-task-definition --cli-input-json file://new-task-def.json --query taskDefinition.taskDefinitionArn --output text)
          
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE --task-definition $NEW_TASK_ARN --force-new-deployment